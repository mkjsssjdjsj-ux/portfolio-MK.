  <script type="text/babel">

    // =========================

    // ضع بيانات Firebase هنا من مشروعك
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const ADMIN_PASSWORD = "2010";
    const APP_ID = "mohamed-khaled-portfolio";
    const CATEGORIES = ["Graphic Design", "Video Design", "Web Design", "App Design", "Branding", "AI Projects"];

    const T = {
      en: {
        home: "Home", about: "About", projects: "Projects", allNew: "All New", contact: "Contact",
        viewProjects: "View Projects", contactMe: "Contact Me", featuredWork: "Featured Work",
        exploreAll: "Explore All", selectedWorks: "Selected Works", noProjects: "No projects yet.",
        allNewTitle: "Latest Updates & News", projectOverview: "Project Overview", comments: "Comments",
        postComment: "Post Comment", letsCollaborate: "Let's Collaborate", sendMessage: "Send Message"
      },
      ar: {
        home: "الرئيسية", about: "من نحن", projects: "المشاريع", allNew: "كل جديد", contact: "اتصل بنا",
        viewProjects: "عرض المشاريع", contactMe: "اتصل بي", featuredWork: "أعمال مميزة",
        exploreAll: "تصفح الكل", selectedWorks: "أعمال مختارة", noProjects: "لا توجد مشاريع بعد.",
        allNewTitle: "آخر التحديثات والأخبار", projectOverview: "نظرة عامة على المشروع", comments: "التعليقات",
        postComment: "نشر التعليق", letsCollaborate: "دعنا نتعاون", sendMessage: "إرسال الرسالة"
      }
    };

    // =========================
    // Tiny icon helpers بدل lucide-react
    // =========================
    const Icon = ({ children, className = "" }) => <span className={className}>{children}</span>;
    const Cpu = (p) => <Icon {...p}>⚙️</Icon>;
    const Globe = (p) => <Icon {...p}>🌐</Icon>;
    const Lock = (p) => <Icon {...p}>🔒</Icon>;
    const Menu = (p) => <Icon {...p}>☰</Icon>;
    const X = (p) => <Icon {...p}>✕</Icon>;
    const Eye = (p) => <Icon {...p}>👁️</Icon>;
    const Star = (p) => <Icon {...p}>⭐</Icon>;
    const MessageSquare = (p) => <Icon {...p}>💬</Icon>;
    const Send = (p) => <Icon {...p}>📨</Icon>;
    const Mail = (p) => <Icon {...p}>✉️</Icon>;
    const Layers = (p) => <Icon {...p}>🧩</Icon>;
    const Edit = (p) => <Icon {...p}>✏️</Icon>;
    const UploadCloud = (p) => <Icon {...p}>⤴️</Icon>;
    const ChevronRight = (p) => <Icon {...p}>→</Icon>;
    const ChevronLeft = (p) => <Icon {...p}>←</Icon>;

    const SOCIAL_ICONS = {
      behance: Layers, instagram: Globe, linkedin: Globe, youtube: Globe,
      facebook: Globe, tiktok: Globe, twitter: Globe
    };

    // =========================
    // Image compression
    // =========================
    const compressImage = (file, maxKB = 800) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            let quality = 0.8;
            const MAX_DIM = 1200;

            if (width > MAX_DIM || height > MAX_DIM) {
              const ratio = Math.min(MAX_DIM / width, MAX_DIM / height);
              width = Math.round(width * ratio);
              height = Math.round(height * ratio);
            }

            const run = () => {
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              const dataUrl = canvas.toDataURL('image/jpeg', quality);
              const sizeKB = (dataUrl.length * 0.75) / 1024;

              if (sizeKB > maxKB && quality > 0.2) {
                quality -= 0.15;
                width *= 0.9;
                height *= 0.9;
                run();
              } else {
                resolve(dataUrl);
              }
            };

            run();
          };
          img.onerror = reject;
        };
        reader.onerror = reject;
      });
    };

    const uploadImageFile = async (file) => {
      if (!file) return null;
      if (typeof file === 'string') return file;
      return await compressImage(file);
    };

    // =========================
    // Main app
    // =========================
    function App() {
      const [firebaseReady, setFirebaseReady] = useState(false);
      const [user, setUser] = useState(null);
      const [currentRoute, setCurrentRoute] = useState('/');
      const [isAdmin, setIsAdmin] = useState(false);
      const [lang, setLang] = useState('ar');
      const [projects, setProjects] = useState([]);
      const [news, setNews] = useState([]);
      const [comments, setComments] = useState([]);
      const [messages, setMessages] = useState([]);
      const [analytics, setAnalytics] = useState({ visitors: 0, pageViews: 0 });
      const [siteConfig, setSiteConfig] = useState({
        logoUrl: '',
        heroImage: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=1000',
        aboutText_en: 'Creative designer specializing in graphics, videos, websites, apps, branding, and AI-powered design solutions.',
        aboutText_ar: 'مصمم مبدع متخصص في الجرافيك والفيديو والمواقع والتطبيقات والعلامات التجارية وحلول التصميم المدعومة بالذكاء الاصطناعي.',
        social: {}
      });
      const [isLoading, setIsLoading] = useState(true);
      const hasTrackedVisitor = useRef(false);

      const navigate = (path) => setCurrentRoute(path);
      const t = T[lang];
      const l = (enStr, arStr) => lang === 'ar' ? (arStr || enStr || '') : (enStr || arStr || '');

      useEffect(() => {
        let app, auth, db;
        try {
          app = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
          auth = firebase.auth();
          db = firebase.firestore();

          auth.signInAnonymously().catch(console.error);
          const unsubAuth = auth.onAuthStateChanged(async (u) => {
            setUser(u || null);
            setFirebaseReady(true);
          });

          return () => unsubAuth && unsubAuth();
        } catch (e) {
          console.error('Firebase init error:', e);
          setFirebaseReady(true);
          setIsLoading(false);
        }
      }, []);

      useEffect(() => {
        if (!firebaseReady) return;
        if (!firebase.apps.length) {
          setIsLoading(false);
          return;
        }

        const db = firebase.firestore();
        const base = db.collection('artifacts').doc(APP_ID).collection('public').doc('data');

        const trackVisitor = async () => {
          if (!hasTrackedVisitor.current) {
            hasTrackedVisitor.current = true;
            try {
              await base.collection('stats').doc('analytics').set({ visitors: (analytics.visitors || 0) + 1 }, { merge: true });
            } catch (_) {}
          }
        };
        trackVisitor();

        const unsubs = [];
        unsubs.push(base.collection('projects').onSnapshot((snap) => {
          const arr = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (b.created_at || 0) - (a.created_at || 0));
          setProjects(arr);
          setIsLoading(false);
        }, () => setIsLoading(false)));

        unsubs.push(base.collection('news').onSnapshot((snap) => {
          setNews(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (b.created_at || 0) - (a.created_at || 0)));
        }));

        unsubs.push(base.collection('comments').onSnapshot((snap) => {
          setComments(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }));

        unsubs.push(base.collection('messages').onSnapshot((snap) => {
          setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (b.created_at || 0) - (a.created_at || 0)));
        }));

        unsubs.push(base.collection('config').doc('main').onSnapshot((snap) => {
          if (snap.exists) setSiteConfig(prev => ({ ...prev, ...snap.data() }));
        }));

        unsubs.push(base.collection('stats').doc('analytics').onSnapshot((snap) => {
          if (snap.exists) setAnalytics(prev => ({ ...prev, ...snap.data() }));
        }));

        return () => unsubs.forEach(fn => fn && fn());
      }, [firebaseReady]);

      useEffect(() => {
        if (!firebaseReady || !firebase.apps.length) return;
        if (currentRoute !== '/admin' && isAdmin) setIsAdmin(false);
        const db = firebase.firestore();
        db.collection('artifacts').doc(APP_ID).collection('public').doc('data')
          .collection('stats').doc('analytics')
          .set({ pageViews: (analytics.pageViews || 0) + 1 }, { merge: true })
          .catch(() => {});
        window.scrollTo(0, 0);
      }, [currentRoute]);

      const renderView = () => {
        if (isLoading) return <LoadingScreen />;
        if (currentRoute === '/') return <HomeView navigate={navigate} projects={projects} news={news} config={siteConfig} l={l} t={t} lang={lang} />;
        if (currentRoute === '/about') return <AboutView config={siteConfig} l={l} t={t} lang={lang} />;
        if (currentRoute === '/projects') return <ProjectsView navigate={navigate} projects={projects} l={l} t={t} lang={lang} />;
        if (currentRoute === '/all-new') return <AllNewView news={news} l={l} t={t} lang={lang} />;
        if (currentRoute.startsWith('/project/')) {
          const id = currentRoute.split('/')[2];
          const project = projects.find(p => p.id === id);
          return <ProjectDetailView project={project} projects={projects} comments={comments.filter(c => c.projectId === id && c.approved !== false)} navigate={navigate} user={user} l={l} t={t} lang={lang} />;
        }
        if (currentRoute === '/contact') return <ContactView t={t} />;
        if (currentRoute === '/admin') return <AdminView isAdmin={isAdmin} setIsAdmin={setIsAdmin} projects={projects} news={news} messages={messages} comments={comments} config={siteConfig} analytics={analytics} />;
        return <HomeView navigate={navigate} projects={projects} news={news} config={siteConfig} l={l} t={t} lang={lang} />;
      };

      return (
        <div dir={lang === 'ar' ? 'rtl' : 'ltr'} className={`min-h-screen bg-[#030712] text-slate-200 selection:bg-cyan-500/30 overflow-x-hidden ${lang === 'ar' ? 'font-arabic' : ''}`}>
          <div className="fixed inset-0 z-0 pointer-events-none">
            <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 rounded-full blur-[120px]"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-cyan-600/20 rounded-full blur-[120px]"></div>
            <div className="absolute top-[40%] left-[50%] w-[30%] h-[30%] bg-indigo-600/10 rounded-full blur-[100px] transform -translate-x-1/2"></div>
          </div>
          <Navigation currentRoute={currentRoute} navigate={navigate} config={siteConfig} lang={lang} setLang={setLang} t={t} />
          <main className="relative z-10 pt-24 pb-16 min-h-screen flex flex-col">
            {renderView()}
          </main>
          <Footer config={siteConfig} />
        </div>
      );
    }

    const LoadingScreen = () => (
      <div className="fixed inset-0 z-50 flex items-center justify-center bg-[#030712]">
        <div className="relative flex items-center justify-center">
          <div className="w-16 h-16 border-t-2 border-b-2 border-cyan-400 rounded-full animate-spin"></div>
          <div className="absolute w-8 h-8 border-r-2 border-l-2 border-blue-600 rounded-full animate-spin-reverse"></div>
          <Cpu className="absolute w-4 h-4 text-cyan-400 animate-pulse" />
        </div>
      </div>
    );

    const Navigation = ({ currentRoute, navigate, config, lang, setLang, t }) => {
      const [isOpen, setIsOpen] = useState(false);
      const navItems = [
        { path: '/', label: t.home },
        { path: '/about', label: t.about },
        { path: '/projects', label: t.projects },
        { path: '/all-new', label: t.allNew },
        { path: '/contact', label: t.contact },

      return (
        <header className="fixed top-0 w-full z-40 bg-[#030712]/70 backdrop-blur-xl border-b border-white/5">

            <div className="flex items-center gap-3 cursor-pointer hover:scale-105 transition-transform" onClick={() => navigate('/')}>
              {config.logoUrl ? (
                <img src={config.logoUrl} alt="Logo" className="h-10 object-contain" />
              ) : (
                <div className="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">Bta3 Design</div>
              )}

            <nav className="hidden md:flex items-center gap-8">
              {navItems.map(item => (

                  <Lock className="w-4 h-4" />
                </button>
              </div>
            </nav>

            <button className="md:hidden text-white p-2" onClick={() => setIsOpen(!isOpen)}>
              {isOpen ? <X /> : <Menu />}

          {isOpen && (

                <button key={item.path} onClick={() => { navigate(item.path); setIsOpen(false); }} className={`text-lg uppercase tracking-widest ${currentRoute === item.path ? 'text-cyan-400' : 'text-slate-300'}`}>
                  {item.label}
                </button>

                  <Globe className="w-4 h-4" /> {lang === 'en' ? 'عربي' : 'English'}
                </button>
                <button onClick={() => { navigate('/admin'); setIsOpen(false); }} className="flex items-center gap-2 text-sm text-slate-500">
                  <Lock className="w-4 h-4" /> Admin
                </button>
              </div>
            </div>
          )}
        </header>
      );
    };

    const Footer = ({ config }) => (
      <footer className="relative z-10 border-t border-white/5 bg-[#030712]/50 backdrop-blur-lg mt-auto">
        <div className="max-w-7xl mx-auto px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-6">

            {config.logoUrl && <img src={config.logoUrl} alt="Logo" className="h-8 object-contain opacity-80" />}
            <div className="text-slate-400 text-sm">© {new Date().getFullYear()} Bta3 Design. All rights reserved.</div>
          </div>
          <div className="flex gap-4">
            {Object.entries(config.social || {}).map(([platform, link]) => {
              if (!link) return null;
              const Social = SOCIAL_ICONS[platform] || Globe;
              return (
                <a key={platform} href={link} target="_blank" rel="noreferrer" className="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-slate-400 hover:text-cyan-400 hover:border-cyan-400/50 transition-all">
                  <Social className="w-4 h-4" />
                </a>
              );
            })}
            <a href="mailto:mkjsssjdjsj@gmail.com" className="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-slate-400 hover:text-cyan-400 hover:border-cyan-400/50 transition-all">
              <Mail className="w-4 h-4" />
            </a>
          </div>
        </div>
      </footer>
    );

    const HomeView = ({ navigate, projects, news, config, l, t, lang }) => {
      const featuredProjects = projects.filter(p => p.featured).slice(0, 4);
      const latestNews = news.slice(0, 3);

      return (
        <div className="flex flex-col gap-24 lg:gap-32 w-full animate-fade-in">
          <section className="max-w-7xl mx-auto px-6 w-full pt-12 md:pt-20 flex flex-col-reverse md:flex-row items-center gap-12">
            <div className="flex-1 flex flex-col gap-6 text-center md:text-start">
              <div className="inline-block px-4 py-1.5 rounded-full border border-cyan-500/30 bg-cyan-500/10 text-cyan-300 text-sm font-medium w-fit mx-auto md:mx-0 shadow-[0_0_15px_rgba(6,182,212,0.2)]">
                Mohamed Khaled | Bta3 Design
              </div>
              <h1 className="text-5xl md:text-7xl font-bold leading-tight tracking-tight">
                {lang === 'ar' ? 'مصمم مبدع يصنع' : 'Creative Designer Crafting'}<br className="hidden md:block" />
                <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-indigo-400 animate-gradient-x">
                  {lang === 'ar' ? 'تجارب بصرية مذهلة' : 'Visual Experiences'}
                </span>
              </h1>
              <p className="text-lg md:text-xl text-slate-400 max-w-2xl font-light leading-relaxed">{l(config.aboutText_en, config.aboutText_ar)}</p>
              <div className="flex flex-wrap items-center justify-center md:justify-start gap-4 pt-4">
                <button onClick={() => navigate('/projects')} className="px-8 py-4 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-semibold shadow-[0_0_20px_rgba(6,182,212,0.4)] hover:-translate-y-1 transition-all">{t.viewProjects}</button>
                <button onClick={() => navigate('/contact')} className="px-8 py-4 rounded-xl border border-white/10 bg-white/5 backdrop-blur-md text-white font-semibold hover:bg-white/10 hover:-translate-y-1 transition-all">{t.contactMe}</button>
              </div>
            </div>
            <div className="flex-1 flex justify-center w-full max-w-md md:max-w-none">
              <div className="relative w-72 h-72 md:w-96 md:h-96 rounded-full group">
                <div className="absolute inset-0 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-600 blur-2xl opacity-40 group-hover:opacity-60 transition-opacity duration-700 animate-pulse-slow"></div>
                <div className="absolute inset-2 rounded-full border border-white/20 z-20"></div>
                <img src={config.heroImage} alt="Profile" className="relative z-10 w-full h-full object-cover rounded-full shadow-2xl filter brightness-90 group-hover:brightness-105 transition-all duration-500" />
              </div>
            </div>
          </section>

          <section className="max-w-7xl mx-auto px-6 w-full">
            <div className="flex items-end justify-between mb-12">
              <h2 className="text-3xl md:text-4xl font-bold mb-2 text-white flex items-center gap-3"><Star className="text-cyan-400 w-8 h-8" /> {t.featuredWork}</h2>
              <button onClick={() => navigate('/projects')} className="hidden md:flex items-center gap-2 text-cyan-400 hover:text-cyan-300 transition-colors group">
                {t.exploreAll} {lang==='ar' ? <ChevronLeft className="w-4 h-4" /> : <ChevronRight className="w-4 h-4" />}
              </button>
            </div>
            {featuredProjects.length > 0 ? (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                {featuredProjects.map(project => <ProjectCard key={project.id} project={project} onClick={() => navigate(`/project/${project.id}`)} l={l} />)}
              </div>
            ) : (
              <div className="py-20 text-center border border-dashed border-white/10 rounded-2xl bg-white/5 backdrop-blur-sm text-slate-400">{t.noProjects}</div>
            )}
          </section>

          {latestNews.length > 0 && (
            <section className="max-w-7xl mx-auto px-6 w-full relative">
              <div className="flex items-end justify-between mb-12">
                <h2 className="text-3xl md:text-4xl font-bold text-white flex items-center gap-3"><Globe className="text-cyan-400 w-8 h-8" /> {t.allNewTitle}</h2>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {latestNews.map(item => (
                  <a key={item.id} href={item.link} target="_blank" rel="noreferrer" className="group block bg-white/5 border border-white/10 rounded-2xl overflow-hidden hover:-translate-y-2 transition-transform duration-300">
                    <div className="h-48 overflow-hidden relative"><img src={item.thumbnail || 'https://via.placeholder.com/400'} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt=""/></div>
                    <div className="p-6 relative z-10 bg-[#030712]/50 backdrop-blur-md">
                      <div className="text-xs text-cyan-400 mb-2">{item.created_at ? new Date(item.created_at).toLocaleDateString() : ''}</div>
                      <h3 className="text-xl font-bold mb-2 group-hover:text-cyan-300 transition-colors">{l(item.title_en, item.title_ar)}</h3>
                    </div>
                  </a>
                ))}
              </div>
            </section>
          )}
        </div>
      );
    };

    const AboutView = ({ config, l, lang }) => (
      <div className="max-w-7xl mx-auto px-6 w-full animate-fade-in flex flex-col gap-20">
        <section className="flex flex-col md:flex-row gap-12 items-center bg-white/5 border border-white/10 rounded-3xl p-8 md:p-12 backdrop-blur-xl relative overflow-hidden">

    const ImageUploader = ({ label, multiple = false, files, setFiles }) => {
      const fileInputRef = useRef(null);
      const handleFiles = (newFiles) => {
        const arr = Array.from(newFiles || []);
        if (multiple) setFiles([...(files || []), ...arr]);
        else setFiles(arr.length ? [arr[0]] : []);
      };

      return (
        <div className="space-y-3">
          <label className="text-sm font-semibold text-slate-300">{label}</label>
          <div onClick={() => fileInputRef.current?.click()} className="w-full border-2 border-dashed border-white/20 rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer hover:border-cyan-500/50 text-slate-400">

            <p className="text-sm text-center">Click to upload (JPG, PNG)</p>

          {(files || []).length > 0 && (
            <div className={`grid gap-4 mt-4 ${multiple ? 'grid-cols-4' : 'grid-cols-2'}`}>
              {files.map((f, i) => (
                <div key={i} className="relative rounded-lg overflow-hidden border border-white/10 aspect-video">
                  <img src={typeof f === 'string' ? f : URL.createObjectURL(f)} className="w-full h-full object-cover" alt="Preview" />

      );

    const AdminProjects = ({ projects }) => {
      const [editingProject, setEditingProject] = useState(null);
      const [formData, setFormData] = useState({});
      const [coverFiles, setCoverFiles] = useState([]);
      const [galleryFiles, setGalleryFiles] = useState([]);
      const [isSaving, setIsSaving] = useState(false);

      const baseCol = () => firebase.firestore().collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('projects');

      const handleSave = async (e) => {
        e.preventDefault();
        if (!formData.title_en?.trim() && !formData.title_ar?.trim()) return alert('Title is required');
        setIsSaving(true);
        try {
          let coverUrl = formData.cover_image || '';
          if (coverFiles[0] && typeof coverFiles[0] !== 'string') coverUrl = await uploadImageFile(coverFiles[0]);

          const galUrls = [];
          for (const file of galleryFiles) {
            if (typeof file === 'string') galUrls.push(file);
            else galUrls.push(await uploadImageFile(file));
          }

          const dataToSave = { ...formData, cover_image: coverUrl, gallery_images: galUrls, updated_at: Date.now() };
          Object.keys(dataToSave).forEach(k => dataToSave[k] === undefined && delete dataToSave[k]);

          if (editingProject.isNew) {
            dataToSave.created_at = Date.now();
            await baseCol().add(dataToSave);
          } else {
            await baseCol().doc(editingProject.id).set(dataToSave, { merge: true });
          }
          alert('تم حفظ المشروع بنجاح');
          setEditingProject(null);
        } catch (err) {
          alert(err.message);
        }
        setIsSaving(false);
      };

          <form onSubmit={handleSave} className="space-y-6">
            <input type="text" placeholder="Title EN" value={formData.title_en || ''} onChange={e => setFormData({...formData, title_en: e.target.value})} className="w-full bg-[#030712] border border-white/10 rounded-lg px-4 py-2" />
            <input type="text" placeholder="Title AR" value={formData.title_ar || ''} onChange={e => setFormData({...formData, title_ar: e.target.value})} className="w-full bg-[#030712] border border-white/10 rounded-lg px-4 py-2" dir="rtl" />
            <textarea placeholder="Description EN" value={formData.desc_en || ''} onChange={e => setFormData({...formData, desc_en: e.target.value})} className="w-full bg-[#030712] border border-white/10 rounded-lg px-4 py-2 h-24"></textarea>
            <textarea placeholder="Description AR" value={formData.desc_ar || ''} onChange={e => setFormData({...formData, desc_ar: e.target.value})} className="w-full bg-[#030712] border border-white/10 rounded-lg px-4 py-2 h-24" dir="rtl"></textarea>
            <input type="url" placeholder="Link" value={formData.link || ''} onChange={e => setFormData({...formData, link: e.target.value})} className="w-full bg-[#030712] border border-white/10 rounded-lg px-4 py-2" />
            <ImageUploader label="Thumbnail" files={thumbFiles} setFiles={setThumbFiles} />
            <button type="submit" disabled={isSaving} className="px-6 py-2 bg-cyan-500 text-black font-bold rounded-lg">{isSaving ? 'Saving...' : 'Save'}</button>
          </form>
        );
      }

      return (
        <div>
          <button onClick={() => { setFormData({}); setThumbFiles([]); setEditingItem({isNew: true}); }} className="mb-6 px-4 py-2 bg-cyan-500 text-black font-bold rounded-lg">+ Add News</button>
          {news.map(n => (
            <div key={n.id} className="p-4 mb-2 bg-white/5 border border-white/10 rounded-xl flex justify-between items-center gap-4">
              <div className="flex items-center gap-4 min-w-0"><img src={n.thumbnail} className="w-16 h-12 object-cover rounded" alt=""/> <div className="truncate">{n.title_en || n.title_ar}</div></div>
              <div className="shrink-0">
                <button onClick={() => { setFormData(n); setThumbFiles(n.thumbnail ? [n.thumbnail] : []); setEditingItem(n); }} className="mr-4 text-cyan-400">Edit</button>
                <button onClick={async () => { if (confirm('Delete this news item?')) await baseCol().doc(n.id).delete(); }} className="text-rose-400">Delete</button>
              </div>
            </div>
          ))}
        </div>
      );
    };

    const AdminConfig = ({ config }) => {
      const [formData, setFormData] = useState({ ...config, social: config.social || {} });
      const [logoFiles, setLogoFiles] = useState(config.logoUrl ? [config.logoUrl] : []);
      const [heroFiles, setHeroFiles] = useState(config.heroImage ? [config.heroImage] : []);
      const [isSaving, setIsSaving] = useState(false);

      const handleSave = async (e) => {
        e.preventDefault();
        setIsSaving(true);
        try {
          let logoUrl = formData.logoUrl || '';
          let heroImage = formData.heroImage || '';
          if (logoFiles[0] && typeof logoFiles[0] !== 'string') logoUrl = await uploadImageFile(logoFiles[0]);
          if (heroFiles[0] && typeof heroFiles[0] !== 'string') heroImage = await uploadImageFile(heroFiles[0]);
          await firebase.firestore().collection('artifacts').doc(APP_ID).collection('public').doc('data')
            .collection('config').doc('main').set({ ...formData, logoUrl, heroImage }, { merge: true });
          alert('تم الحفظ بنجاح');
        } catch (err) {
          alert(err.message);
        }
        setIsSaving(false);
      };

      return (
        <form onSubmit={handleSave} className="space-y-8">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <ImageUploader label="Logo" files={logoFiles} setFiles={setLogoFiles} />
            <ImageUploader label="Hero Image" files={heroFiles} setFiles={setHeroFiles} />
          </div>
          <textarea value={formData.aboutText_en || ''} onChange={e => setFormData({...formData, aboutText_en: e.target.value})} placeholder="About text EN" className="w-full bg-[#030712] border border-white/10 rounded-lg px-4 py-2 h-24"></textarea>
          <textarea value={formData.aboutText_ar || ''} onChange={e => setFormData({...formData, aboutText_ar: e.target.value})} placeholder="About text AR" className="w-full bg-[#030712] border border-white/10 rounded-lg px-4 py-2 h-24" dir="rtl"></textarea>
          <input value={formData.social?.instagram || ''} onChange={e => setFormData({...formData, social: { ...(formData.social || {}), instagram: e.target.value }})} placeholder="Instagram URL" className="w-full bg-[#030712] border border-white/10 rounded-lg px-4 py-2" />
          <input value={formData.social?.behance || ''} onChange={e => setFormData({...formData, social: { ...(formData.social || {}), behance: e.target.value }})} placeholder="Behance URL" className="w-full bg-[#030712] border border-white/10 rounded-lg px-4 py-2" />
          <input value={formData.social?.youtube || ''} onChange={e => setFormData({...formData, social: { ...(formData.social || {}), youtube: e.target.value }})} placeholder="YouTube URL" className="w-full bg-[#030712] border border-white/10 rounded-lg px-4 py-2" />
          <button type="submit" disabled={isSaving} className="w-full py-4 bg-cyan-500 text-black font-bold rounded-lg">{isSaving ? 'Saving...' : 'Save Settings'}</button>
        </form>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
